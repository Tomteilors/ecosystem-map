// ═══════════════ CONFIG ═══════════════
const C = {
  root:      { bg:"#13133a", str:"#7070ff" },
  trading:   { bg:"#021408", str:"#00ff88" },
  products:  { bg:"#011522", str:"#00aaff" },
  content:   { bg:"#130a22", str:"#aa44ff" },
  community: { bg:"#1a0d03", str:"#ff8844" },
  brain:     { bg:"#181200", str:"#ffd700" }
};
const TYPE_NAMES = {
  root:"ecosystem", group:"group", project:"project", module:"module",
  process:"process", feature:"feature", algo:"algorithm", file:"file",
  config:"config", service:"service", step:"step", output:"output", command:"command"
};
const NW = 162, NH = 40;

function col(d) {
  if (d.data.id === "root") return C.root;
  return C[d.data.group] || C.root;
}

// ═══════════════ D3 INIT ═══════════════
const svg = d3.select("#chart");
const gMain = svg.append("g").attr("class","main-g");

const zoomBeh = d3.zoom().scaleExtent([0.05,3]).on("zoom", e => gMain.attr("transform", e.transform));
svg.call(zoomBeh);

// Grid
const defs = svg.append("defs");
const pat = defs.append("pattern").attr("id","grid").attr("width",50).attr("height",50).attr("patternUnits","userSpaceOnUse");
pat.append("path").attr("d","M50 0L0 0 0 50").attr("fill","none").attr("stroke","rgba(255,255,255,0.025)").attr("stroke-width","1");
svg.insert("rect","g").attr("width","200%").attr("height","200%").attr("x","-50%").attr("y","-50%").attr("fill","url(#grid)");

// ═══════════════ TREE ═══════════════
let root, selNode = null;

function init() {
  root = d3.hierarchy(RAW);
  // Collapse depth >= 3
  root.each(d => {
    if (d.depth >= 3 && d.children) { d._ch = d.children; d.children = null; }
  });
  render(root);
  setTimeout(fitView, 80);
}

function treeLayout() {
  return d3.tree().nodeSize([46, 210]);
}

function render(src) {
  treeLayout()(root);

  const nodes = root.descendants();
  const links = root.links();

  // ─── links ───
  const lkSel = gMain.selectAll(".link").data(links, d => d.target.data.id);

  lkSel.enter().append("path")
    .attr("class","link")
    .attr("d", d => bez(src, src))
    .attr("stroke", d => col(d.target).str)
    .style("opacity",0)
  .merge(lkSel)
    .transition().duration(380)
    .attr("d", d => bez(d.source, d.target))
    .style("opacity", 0.2);

  lkSel.exit().transition().duration(280).attr("d", d => bez(src,src)).style("opacity",0).remove();

  // ─── nodes ───
  const ndSel = gMain.selectAll(".node").data(nodes, d => d.data.id);

  const ndEnter = ndSel.enter().append("g")
    .attr("class","node")
    .attr("transform", () => `translate(${src._px||src.x},${src._py||src.y})`)
    .style("opacity",0)
    .on("click", (ev, d) => { ev.stopPropagation(); onClick(d); })
    .on("dblclick", (ev, d) => { ev.stopPropagation(); toggle(d); })
    .on("touchstart", (ev, d) => { ev.stopPropagation(); onTouch(ev,d); }, {passive:true})
    .on("mouseover", (ev,d) => showTip(ev,d))
    .on("mousemove", moveTip)
    .on("mouseout", hideTip);

  ndEnter.append("rect")
    .attr("x",-NW/2).attr("y",-NH/2)
    .attr("width",NW).attr("height",NH)
    .attr("rx",7).attr("ry",7)
    .attr("fill", d => col(d).bg)
    .attr("stroke", d => col(d).str);

  // main label
  ndEnter.append("text").attr("class","node-label")
    .attr("text-anchor","middle")
    .attr("dy", d => d.data.type==="root" ? "0.35em" : "-0.05em")
    .attr("fill", d => col(d).str)
    .text(d => clip(d.data.name, 21));

  // sub label
  ndEnter.filter(d => d.data.type !== "root")
    .append("text").attr("class","node-sub")
    .attr("text-anchor","middle").attr("dy","1.15em")
    .text(d => TYPE_NAMES[d.data.type] || d.data.type);

  // expand dot
  ndEnter.filter(d => d._ch)
    .append("circle").attr("class","exp-circle")
    .attr("cx", NW/2-9).attr("cy",0).attr("r",7);
  ndEnter.filter(d => d._ch)
    .append("text").attr("class","exp-text")
    .attr("x", NW/2-9).attr("y",0)
    .attr("text-anchor","middle").attr("dy","0.35em")
    .text("+");

  const ndMerge = ndEnter.merge(ndSel);
  ndMerge.transition().duration(380)
    .attr("transform", d => `translate(${d.x},${d.y})`)
    .style("opacity",1);

  // Update expand indicators on existing
  ndMerge.select(".exp-circle").attr("visibility", d => d._ch ? "visible":"hidden");
  ndMerge.select(".exp-text").text(d => d._ch ? "+" : "").attr("visibility", d => d._ch ? "visible":"hidden");

  ndSel.exit().transition().duration(280)
    .attr("transform", `translate(${src.x},${src.y})`).style("opacity",0).remove();

  // save pos
  nodes.forEach(d => { d._px = d.x; d._py = d.y; });

  if (selNode) lightPath(selNode);
}

function bez(s, t) {
  const my = (s.y + t.y) / 2;
  return `M${s.x},${s.y} C${s.x},${my} ${t.x},${my} ${t.x},${t.y}`;
}
function clip(s, n) { return s.length > n ? s.slice(0,n-1)+"…" : s; }

// ═══════════════ INTERACTION ═══════════════
let touchTm = null;
function onTouch(ev, d) {
  if (touchTm) { clearTimeout(touchTm); touchTm = null; toggle(d); }
  else { touchTm = setTimeout(() => { touchTm = null; onClick(d); }, 250); }
}
function onClick(d) {
  hideTip();
  if (selNode === d) { selNode = null; clearLight(); setPath(""); }
  else { selNode = d; lightPath(d); setPath(d); }
}
function toggle(d) {
  if (d.children) { d._ch = d.children; d.children = null; }
  else if (d._ch) { d.children = d._ch; d._ch = null; }
  render(d);
}
function lightPath(d) {
  const anc = new Set(), desc = new Set();
  let c = d; while(c) { anc.add(c.data.id); c = c.parent; }
  d.each(n => desc.add(n.data.id));
  const all = new Set([...anc, ...desc]);

  gMain.selectAll(".node")
    .classed("selected", n => n===d)
    .classed("dimmed", n => !all.has(n.data.id));
  gMain.selectAll(".link")
    .classed("lit", l => anc.has(l.source.data.id) && anc.has(l.target.data.id))
    .style("opacity", l => (anc.has(l.source.data.id) && anc.has(l.target.data.id)) ? 0.9 : 0.04);
}
function clearLight() {
  gMain.selectAll(".node").classed("selected",false).classed("dimmed",false);
  gMain.selectAll(".link").classed("lit",false).style("opacity",0.2);
}
function setPath(d) {
  const bar = document.getElementById("pathbar");
  if (!d) { bar.classList.remove("vis"); return; }
  const p = []; let c = d; while(c) { p.unshift(c.data.name); c = c.parent; }
  bar.textContent = p.join(" › ");
  bar.classList.add("vis");
}
svg.on("click", () => { selNode = null; clearLight(); setPath(""); });

// ═══════════════ TOOLTIP ═══════════════
const tt = document.getElementById("tt");
function showTip(ev, d) {
  const c = col(d);
  document.getElementById("tt-name").textContent = d.data.name;
  const b = document.getElementById("tt-badge");
  b.textContent = TYPE_NAMES[d.data.type] || d.data.type;
  b.style.cssText = `background:${c.str}18;color:${c.str};border:1px solid ${c.str}40`;
  document.getElementById("tt-desc").textContent = d.data.desc || "";
  document.getElementById("tt-server").textContent = d.data.server ? "⚙ "+d.data.server : "";
  tt.style.display = "block";
  moveTip(ev);
}
function moveTip(ev) {
  const x = ev.clientX||0, y = ev.clientY||0;
  const tw = tt.offsetWidth, th = tt.offsetHeight;
  let lx = x+14, ly = y+14;
  if (lx+tw > window.innerWidth-8) lx = x-tw-14;
  if (ly+th > window.innerHeight-8) ly = y-th-14;
  tt.style.left = lx+"px"; tt.style.top = ly+"px";
}
function hideTip() { tt.style.display="none"; }

// ═══════════════ CONTROLS ═══════════════
function fitView() {
  const w = window.innerWidth, h = window.innerHeight - 48;
  // Find bounds
  const nodes = root.descendants();
  let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;
  nodes.forEach(d => { if(d.x<x0)x0=d.x; if(d.x>x1)x1=d.x; if(d.y<y0)y0=d.y; if(d.y>y1)y1=d.y; });
  const pw = x1-x0+NW+40, ph = y1-y0+NH+40;
  const sc = Math.min(w/pw, h/ph, 0.65);
  const tx = w/2 - (x0+x1)/2*sc;
  const ty = 60 - y0*sc;
  svg.call(zoomBeh.transform, d3.zoomIdentity.translate(tx,ty).scale(sc));
}
function resetView() { fitView(); }
function expandAll() {
  root.each(d => { if(d._ch) { d.children=d._ch; d._ch=null; } });
  render(root); setTimeout(fitView,420);
}
function collapseAll() {
  root.each(d => { if(d.depth>=2&&d.children) { d._ch=d.children; d.children=null; } });
  render(root);
}

// ═══════════════ START ═══════════════
init();
window.addEventListener("resize", fitView);
</script>
